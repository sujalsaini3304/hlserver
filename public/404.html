<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found</title>

  <style>
    :root {
      --text: #111827;
      --muted: #6b7280;
      --bg: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      max-width: 420px;
      padding: 20px;
    }

    /* Lottie animation */
    canvas {
      width: 300px;
      height: 300px;
      margin-bottom: 20px;
    }

    /* Text below animation */
    .code {
      font-size: 48px;
      font-weight: 600;
      letter-spacing: -1px;
    }

    .title {
      font-size: 18px;
      margin-top: 8px;
      font-weight: 500;
    }

    .desc {
      margin-top: 6px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }
  </style>
</head>

<body>

  <div class="container">
    <!-- Lottie Animation -->
    <canvas id="canvas"></canvas>

    <div class="title">Page not found</div>
    <div class="desc">
      The page you are looking for doesn’t exist.
    </div>
  </div>

  <script type="module">
    import { DotLottie } from "https://cdn.jsdelivr.net/npm/@lottiefiles/dotlottie-web/+esm";

    new DotLottie({
      autoplay: true,
      loop: true,
      canvas: document.getElementById("canvas"),
      src: "/animation/page_not_found.lottie",
    });
  </script>

</body>
</html>
